# .github/workflows/nightly_sync.yml
# Nightly multi-anchor sync — runs at 3 AM ET daily.
# Required secrets: RESCUEGROUPS_API_KEY, OPENAI_API_KEY

name: Nightly Petfinder Sync

on:
  schedule:
    - cron: "0 8 * * *"   # 03:00 ET
  workflow_dispatch:        # allow manual trigger

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run multi-anchor sync
        env:
          RESCUEGROUPS_API_KEY: ${{ secrets.RESCUEGROUPS_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SYNC_DISTANCE_MILES: "30"
          SYNC_MAX_PAGES: "10"
        run: python -m src.ingestion.sync